# MMMResidenceChunkBridge
# 该插件只负责把 Residence 的底层领地能力包装成更适合服务器使用的区块化管理流程。

allowed-worlds:
  - world

currency:
  display-name: "奶油币"

claims:
  internal-name-prefix: "chunk"
  full-height: true
  min-chunks: 1
  max-chunks-per-claim: 64
  no-claim-radius-blocks: 0
  protected-center-x: 0
  protected-center-z: 0
  rectangular-only: true
  set-teleport-on-create: true

visual:
  preview-duration-ticks: 80
  preview-step-blocks: 2
  preview-particle: END_ROD

selection:
  tool: GOLDEN_SHOVEL
  require-tool: true
  timeout-seconds: 120
  preview-period-ticks: 10

limits:
  default-max-claims: 4
  permission-max-claims:
    mmmland.limit.1: 1
    mmmland.limit.2: 2
    mmmland.limit.4: 4
    mmmland.limit.8: 8

pricing:
  create:
    fallback-last-tier: true
    price-per-extra-chunk: 500
    tiers:
      1: 0
      2: 1000
      3: 2000
      4: 4000
  expand:
    price-per-chunk: 500
  contract:
    refund-enabled: false

messages:
  prefix: "&6[领地]&r "
  no-permission: "&c你没有权限执行这个操作。"
  player-only: "&c这个命令只能由玩家执行。"
  residence-missing: "&c未找到该领地。"
  residence-not-managed: "&c这个领地不是由本插件创建的。"
  residence-not-owner: "&c你不是这个领地的所有者。"
  display-name-exists: "&c你已有同名显示领地: &f%name%"
  display-name-ambiguous: "&c找到多个重名领地，请改用更精确的显示名。"
  world-not-allowed: "&c当前世界不允许圈地。"
  inside-protected-center: "&c这个位置位于服务器中心保护范围内，不能创建领地。"
  create-usage: "&e用法: /mmmland create [显示名]"
