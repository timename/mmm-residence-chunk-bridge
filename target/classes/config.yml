  gui:
    main-title: "&8领地菜单"
    list-title: "&8我的领地"
    detail-title: "&8领地操作"
    direction-title: "&8选择方向"
    amount-title: "&8选择区块数"
    delete-confirm-title: "&8确认删除"
  help:
    - "&e/mmmland create [显示名] &7在当前区块创建整列领地"
    - "&e/mmmland rename <旧显示名> <新显示名> &7重命名显示名称"
    - "&e/mmmland list &7查看你的领地"
